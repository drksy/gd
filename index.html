// ── Auth ───────────────────────────────────────────────────────────────
function AuthScreen({onAuth}){
  const[email,setEmail]=useState(""),[pw,setPw]=useState(""),[loading,setLoading]=useState(false),[err,setErr]=useState("");
  async function go(){
    if(!email||!pw){setErr("Required");return;}
    setLoading(true);setErr("");
    const{data,error}=await db.auth.signInWithPassword({email,password:pw});
    if(error){setErr(error.message);setLoading(false);return;}
    onAuth(data.user);
  }
  return(
    <div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:340}}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{fontSize:32,fontWeight:900,letterSpacing:-2}}>GAMEDAY</div>
          <div style={{fontSize:9,color:"#FF6B00",letterSpacing:3,fontWeight:700,textTransform:"uppercase",marginTop:5}}>Command Center</div>
        </div>
        <label style={LBL}>Email</label>
        <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="you@example.com" style={{...INP,marginBottom:14}} autoCapitalize="none"/>
        <label style={LBL}>Password</label>
        <input type="password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="••••••••" style={{...INP,marginBottom:18}}/>
        {err&&<div style={{fontSize:12,color:"#FF453A",marginBottom:14,padding:"8px 12px",borderRadius:8,background:"#1a0a0a"}}>{err}</div>}
        <button onClick={go} disabled={loading} style={{width:"100%",padding:13,borderRadius:10,border:"none",background:loading?"#222":"#FF6B00",color:loading?MUTED:"#000",fontWeight:900,fontSize:14,cursor:loading?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          {loading&&<Spinner size={16} color="#555"/>}{loading?"…":"Sign In"}
        </button>
      </div>
    </div>
  );
}

// ── Command Center ─────────────────────────────────────────────────────
function CommandCenter({game,team,userId,brands,onBack}){
  const[tasks,setTasks]=useState([]);
  const[comps,setComps]=useState({});
  const[loading,setLoading]=useState(true);
  const[brandTab,setBrandTab]=useState("all");
  const[phaseTab,setPhaseTab]=useState("all");
  const[editTask,setEditTask]=useState(null);
  const[showAdd,setShowAdd]=useState(false);
  const[delTask,setDelTask]=useState(null);
  const[q,setQ]=useState("");
  const[showQ,setShowQ]=useState(false);
  const accent=team.color;
  const du=daysUntil(game.game_date);

  const load=async()=>{
    setLoading(true);
    const[tR,cR]=await Promise.all([
      db.from("gd_tasks").select("*").eq("user_id",userId).in("team_id",[team.id,"all"]).eq("active",true).order("sort_order").order("created_at"),
      db.from("gd_completions").select("*").eq("user_id",userId).eq("game_id",game.id),
    ]);
    setTasks(tR.data||[]);
    const cm={};(cR.data||[]).forEach(c=>{cm[c.task_id]={done:c.done,id:c.id};});
    setComps(cm);setLoading(false);
  };
  useEffect(()=>{load();},[game.id]);

  const toggleDone=async(task,done)=>{
    const ex=comps[task.id];
    const upd={done,done_at:done?new Date().toISOString():null};
    if(ex){await db.from("gd_completions").update(upd).eq("id",ex.id);}
    else{const nr={id:genId(),user_id:userId,game_id:game.id,task_id:task.id,...upd};await db.from("gd_completions").insert(nr);}
    setComps(c=>({...c,[task.id]:{done,id:ex?.id||""}}));
  };

  const usedBrands=useMemo(()=>[...new Set(tasks.map(t=>t.brand).filter(Boolean))].sort(),[tasks]);

  const filtered=useMemo(()=>{
    let t=tasks;
    if(brandTab!=="all")t=t.filter(x=>x.brand===brandTab);
    if(phaseTab!=="all")t=t.filter(x=>x.phase===phaseTab);
    if(q.trim())t=t.filter(x=>(x.title||"").toLowerCase().includes(q.toLowerCase())||(x.body_notes||"").toLowerCase().includes(q.toLowerCase()));
    return t;
  },[tasks,brandTab,phaseTab,q]);

  const byPhase=useMemo(()=>{const m={};PHASES.forEach(p=>{m[p.id]=filtered.filter(t=>t.phase===p.id);});return m;},[filtered]);
  const doneC=Object.values(comps).filter(c=>c.done).length;
  const pct=tasks.length?Math.round(doneC/tasks.length*100):0;

  const gameLabel=du===0?"GAME DAY 🔴":du===1?"TOMORROW":du!==null&&du>1?`IN ${du} DAYS`:du!==null&&du<0?`${Math.abs(du)}d AGO`:"";

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#000"}}>
      <div style={{background:"#000",borderBottom:`1px solid ${BORDER}`,flexShrink:0}}>
        {/* Top bar */}
        <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
          <BackBtn onClick={onBack}/>
          <span style={{fontSize:22,lineHeight:1}}>{team.emoji}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:900,fontSize:15,color:accent,letterSpacing:-.5}}>{team.name}</div>
            <div style={{fontSize:10,color:MUTED}}>{fmtDate(game.game_date,{weekday:"long",month:"long",day:"numeric"})}</div>
          </div>
          <button onClick={()=>setShowQ(s=>!s)} style={{background:showQ?"#111":"none",border:`1px solid ${showQ?accent:BORDER}`,borderRadius:8,padding:"6px 10px",cursor:"pointer",color:showQ?accent:MUTED,fontSize:13}}>🔍</button>
          <button onClick={()=>setShowAdd(true)} style={{background:accent,border:"none",borderRadius:8,padding:"6px 13px",cursor:"pointer",color:"#fff",fontSize:13,fontWeight:800}}>+ Task</button>
        </div>

        {/* Game info */}
        <div style={{padding:"8px 16px 10px",background:accent+"0d",borderTop:`1px solid ${accent}1a`,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span style={{fontSize:12,fontWeight:800,color:du===0?"#30D158":du===1?"#FF9F0A":TEXT}}>{gameLabel}</span>
          {game.opponent&&<span style={{fontSize:11,color:MUTED}}>vs {game.opponent}</span>}
          {game.game_time&&<span style={{fontSize:11,color:MUTED}}>🕐 {fmtTime(game.game_time)}</span>}
          <span style={{fontSize:11,color:MUTED}}>{game.location==="home"?"🏠 Home":game.location==="away"?"✈️ Away":"⚪ Neutral"}</span>
          <div style={{flex:1}}/>
          {/* Progress */}
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <div style={{width:64,height:4,borderRadius:2,background:"#1a1a1a",overflow:"hidden"}}>
              <div style={{width:pct+"%",height:"100%",background:pct===100?"#30D158":"#FF6B00",transition:"width .3s,background .3s"}}/>
            </div>
            <span style={{fontSize:10,color:pct===100?"#30D158":MUTED,fontWeight:pct===100?700:400}}>{doneC}/{tasks.length}</span>
          </div>
        </div>

        {/* Search */}
        {showQ&&(
          <div style={{padding:"0 16px 10px"}}>
            <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Search content…" style={{...INP,border:`1px solid ${accent}44`}}/>
          </div>
        )}

        {/* Filters */}
        <div style={{overflowX:"auto",scrollbarWidth:"none",borderTop:`1px solid ${BORDER}`}}>
          <div style={{display:"flex",padding:"0 8px",minWidth:"max-content"}}>
            {/* Brand tabs */}
            {["all",...usedBrands].map(b=>{
              const active=brandTab===b;
              return(
                <button key={b} onClick={()=>setBrandTab(b)}
                  style={{padding:"9px 12px",border:"none",borderBottom:active?`2px solid ${accent}`:"2px solid transparent",background:"none",color:active?accent:MUTED,fontSize:11,fontWeight:active?700:400,cursor:"pointer",whiteSpace:"nowrap",transition:"color .15s"}}>
                  {b==="all"?"ALL":b}
                </button>
              );
            })}
            {usedBrands.length>0&&<div style={{width:1,background:BORDER,margin:"8px 4px",flexShrink:0}}/>}
            {/* Phase tabs */}
            {["all",...PHASES.map(p=>p.id)].map(pid=>{
              const ph=PMAP[pid];
              const active=phaseTab===pid;
              const cnt=pid==="all"?filtered.length:(byPhase[pid]||[]).length;
              if(pid!=="all"&&!cnt)return null;
              return(
                <button key={pid} onClick={()=>setPhaseTab(pid)}
                  style={{padding:"9px 12px",border:"none",borderBottom:active?`2px solid ${ph?.color||accent}`:"2px solid transparent",background:"none",color:active?(ph?.color||accent):MUTED,fontSize:11,fontWeight:active?700:400,cursor:"pointer",whiteSpace:"nowrap",transition:"color .15s"}}>
                  {ph?ph.icon+" "+ph.label:"ALL PHASES"}
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {/* Content list */}
      <div style={{flex:1,overflowY:"auto",padding:"12px 16px 40px"}}>
        {loading&&<div style={{display:"flex",justifyContent:"center",padding:48}}><Spinner color={accent}/></div>}
        {!loading&&filtered.length===0&&(
          <div style={{textAlign:"center",padding:"64px 0",color:"#222",fontSize:13}}>
            <div style={{fontSize:32,marginBottom:10}}>{team.emoji}</div>
            {tasks.length===0?"No content tasks yet — tap + Task to add your first":"Nothing matches this filter"}
          </div>
        )}
        {!loading&&phaseTab==="all"
          ?PHASES.map(ph=>{
              const items=byPhase[ph.id]||[];if(!items.length)return null;
              const pd=items.filter(t=>comps[t.id]?.done).length;
              return(
                <div key={ph.id} style={{marginBottom:20}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8,padding:"2px 0"}}>
                    <span style={{fontSize:14}}>{ph.icon}</span>
                    <span style={{fontSize:10,fontWeight:800,color:ph.color,letterSpacing:1.2,textTransform:"uppercase"}}>{ph.label}</span>
                    <span style={{fontSize:9,color:MUTED,fontStyle:"italic"}}>{ph.desc}</span>
                    <div style={{flex:1,height:1,background:ph.color+"22",marginLeft:4}}/>
                    <span style={{fontSize:10,color:pd===items.length&&items.length>0?"#30D158":ph.color,fontWeight:700}}>{pd}/{items.length}</span>
                  </div>
                  {items.map(t=><ContentCard key={t.id} task={t} done={!!comps[t.id]?.done} onToggle={v=>toggleDone(t,v)} onEdit={t=>setEditTask(t)} onDelete={t=>setDelTask(t)} teamName={team.name}/>)}
                </div>
              );
            })
          :filtered.map(t=><ContentCard key={t.id} task={t} done={!!comps[t.id]?.done} onToggle={v=>toggleDone(t,v)} onEdit={t=>setEditTask(t)} onDelete={t=>setDelTask(t)} teamName={team.name}/>)
        }
      </div>

      {showAdd&&<TaskForm userId={userId} teamId={team.id} brands={brands} onSave={()=>{setShowAdd(false);load();}} onClose={()=>setShowAdd(false)}/>}
      {editTask&&<TaskForm task={editTask} userId={userId} brands={brands} onSave={()=>{setEditTask(null);load();}} onClose={()=>setEditTask(null)}/>}
      {delTask&&<ConfirmDel msg={`Delete "${delTask.title}"?`} onConfirm={async()=>{await db.from("gd_tasks").update({active:false}).eq("id",delTask.id);setDelTask(null);load();}} onCancel={()=>setDelTask(null)}/>}
    </div>
  );
}

// ── Team Screen ────────────────────────────────────────────────────────
function TeamScreen({team,userId,brands,onGo,onBack}){
  const[games,setGames]=useState([]);
  const[taskCounts,setTaskCounts]=useState({});
  const[loading,setLoading]=useState(true);
  const[showAdd,setShowAdd]=useState(false);
  const[editGame,setEditGame]=useState(null);
  const[delGame,setDelGame]=useState(null);
  const[tab,setTab]=useState("upcoming");
  const accent=team.color;
  const today=todayStr();

  const load=async()=>{
    setLoading(true);
    const[gR,tR]=await Promise.all([
      db.from("gd_games").select("*").eq("user_id",userId).eq("team_id",team.id).order("game_date").order("game_time"),
      db.from("gd_tasks").select("id,phase").eq("user_id",userId).in("team_id",[team.id,"all"]).eq("active",true),
    ]);
    setGames(gR.data||[]);
    // Total content tasks for this team
    const counts={total:(tR.data||[]).length};
    PHASES.forEach(p=>{counts[p.id]=(tR.data||[]).filter(t=>t.phase===p.id).length;});
    setTaskCounts(counts);
    setLoading(false);
  };
  useEffect(()=>{load();},[team.id]);

  const upcoming=games.filter(g=>g.game_date>=today).sort((a,b)=>a.game_date.localeCompare(b.game_date));
  const past=games.filter(g=>g.game_date<today).sort((a,b)=>b.game_date.localeCompare(a.game_date));
  const next=upcoming[0]||null;
  const du=next?daysUntil(next.game_date):null;

  const GameRow=({g})=>{
    const d=daysUntil(g.game_date);
    const isPast=d!==null&&d<0;
    return(
      <div style={{background:"#0d0d0d",border:`1px solid ${!isPast&&d===0?accent+"55":BORDER}`,borderRadius:10,padding:"11px 14px",marginBottom:6,display:"flex",alignItems:"center",gap:10,opacity:isPast?.6:1}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:700,color:isPast?MUTED:TEXT}}>{fmtDate(g.game_date,{weekday:"short",month:"short",day:"numeric",year:"numeric"})}{g.game_time&&<span style={{fontSize:11,color:MUTED,fontWeight:400}}> · {fmtTime(g.game_time)}</span>}</div>
          <div style={{fontSize:11,color:MUTED,marginTop:2}}>{g.opponent?"vs "+g.opponent:""}{g.location?" · "+(g.location==="home"?"🏠 Home":g.location==="away"?"✈️ Away":"⚪ Neutral"):""}{g.notes?" · "+g.notes:""}</div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
          {!isPast&&d===0&&<span style={{fontSize:9,fontWeight:800,color:"#30D158",background:"#30D15822",borderRadius:4,padding:"2px 7px"}}>TODAY</span>}
          {!isPast&&d===1&&<span style={{fontSize:9,fontWeight:800,color:"#FF9F0A",background:"#FF9F0A22",borderRadius:4,padding:"2px 7px"}}>TOMORROW</span>}
          {!isPast&&d!==null&&d>1&&<span style={{fontSize:11,color:MUTED}}>in {d}d</span>}
          {!isPast&&<button onClick={()=>onGo(g)} style={{padding:"6px 12px",borderRadius:8,border:"none",background:accent,color:"#fff",fontSize:11,fontWeight:800,cursor:"pointer"}}>GO LIVE</button>}
          <button onClick={()=>setEditGame(g)} style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:7,padding:"5px 8px",cursor:"pointer",color:MUTED,fontSize:11}}>✏️</button>
          <button onClick={()=>setDelGame(g)} style={{background:"none",border:"none",cursor:"pointer",color:"#FF453A33",fontSize:16,lineHeight:1,transition:"color .15s"}} onMouseEnter={e=>e.currentTarget.style.color="#FF453A"} onMouseLeave={e=>e.currentTarget.style.color="#FF453A33"}>×</button>
        </div>
      </div>
    );
  };

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#000"}}>
      <div style={{background:"#000",borderBottom:`1px solid ${BORDER}`,flexShrink:0}}>
        <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
          <BackBtn onClick={onBack}/>
          <span style={{fontSize:26,lineHeight:1}}>{team.emoji}</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:900,fontSize:16,color:accent,letterSpacing:-.5}}>{team.name}</div>
            <div style={{fontSize:10,color:MUTED,letterSpacing:.5}}>{team.sport}</div>
          </div>
          <button onClick={()=>setShowAdd(true)} style={{background:accent,border:"none",borderRadius:8,padding:"6px 14px",cursor:"pointer",color:"#fff",fontSize:12,fontWeight:800}}>+ Game</button>
        </div>

        {/* Next game hero */}
        {next&&(
          <div style={{padding:"10px 16px 12px",background:accent+"0d",borderTop:`1px solid ${accent}1a`,display:"flex",alignItems:"center",gap:10}}>
            <div style={{flex:1}}>
              <div style={{fontSize:9,color:MUTED,letterSpacing:.5,textTransform:"uppercase",marginBottom:3}}>Next Game</div>
              <div style={{fontSize:14,fontWeight:800,color:du===0?"#30D158":du===1?"#FF9F0A":TEXT}}>{du===0?"Today!":du===1?"Tomorrow":fmtDate(next.game_date)}</div>
              <div style={{fontSize:11,color:MUTED,marginTop:2}}>{next.opponent?"vs "+next.opponent:""}{next.game_time?" · "+fmtTime(next.game_time):""}</div>
            </div>
            {taskCounts.total>0&&(
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:9,color:MUTED,letterSpacing:.5,textTransform:"uppercase",marginBottom:3}}>Content Tasks</div>
                <div style={{fontSize:22,fontWeight:900,color:accent,lineHeight:1}}>{taskCounts.total}</div>
                <div style={{fontSize:9,color:MUTED}}>across {PHASES.filter(p=>taskCounts[p.id]>0).length} phases</div>
              </div>
            )}
            <button onClick={()=>onGo(next)} style={{padding:"9px 18px",borderRadius:9,border:"none",background:accent,color:"#fff",fontSize:13,fontWeight:900,cursor:"pointer"}}>GO LIVE</button>
          </div>
        )}

        {/* Phase task counts */}
        {taskCounts.total>0&&(
          <div style={{overflowX:"auto",scrollbarWidth:"none",borderTop:`1px solid ${BORDER}`,padding:"0 8px"}}>
            <div style={{display:"flex",padding:"8px 0",gap:4,minWidth:"max-content"}}>
              {PHASES.filter(p=>taskCounts[p.id]>0).map(p=>(
                <div key={p.id} style={{padding:"4px 10px",borderRadius:7,background:p.color+"11",border:`1px solid ${p.color}33`,flexShrink:0}}>
                  <div style={{fontSize:9,color:p.color,fontWeight:700,letterSpacing:.5}}>{p.icon} {p.label}</div>
                  <div style={{fontSize:14,fontWeight:800,color:p.color,lineHeight:1.2}}>{taskCounts[p.id]}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        <div style={{display:"flex",borderTop:`1px solid ${BORDER}`}}>
          {[{id:"upcoming",label:"Upcoming",count:upcoming.length},{id:"past",label:"Past",count:past.length}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{flex:1,padding:"9px 0",border:"none",borderBottom:tab===t.id?`2px solid ${accent}`:"2px solid transparent",background:"none",color:tab===t.id?accent:MUTED,fontSize:11,fontWeight:tab===t.id?700:400,cursor:"pointer"}}>
              {t.label} ({t.count})
            </button>
          ))}
        </div>
      </div>

      <div style={{flex:1,overflowY:"auto",padding:"12px 16px 40px"}}>
        {loading&&<div style={{display:"flex",justifyContent:"center",padding:48}}><Spinner color={accent}/></div>}
        {!loading&&(tab==="upcoming"?upcoming:past).length===0&&(
          <div style={{textAlign:"center",padding:"56px 0",color:"#222",fontSize:13}}>
            <div style={{fontSize:32,marginBottom:10}}>{team.emoji}</div>
            {tab==="upcoming"?"No upcoming games — tap + Game to schedule one":"No past games recorded"}
          </div>
        )}
        {!loading&&(tab==="upcoming"?upcoming:past).map(g=><GameRow key={g.id} g={g}/>)}
      </div>

      {showAdd&&<GameForm userId={userId} teamId={team.id} teamColor={accent} onSave={()=>{setShowAdd(false);load();}} onClose={()=>setShowAdd(false)}/>}
      {editGame&&<GameForm game={editGame} userId={userId} teamId={team.id} teamColor={accent} onSave={()=>{setEditGame(null);load();}} onClose={()=>setEditGame(null)}/>}
      {delGame&&<ConfirmDel msg={`Delete game vs ${delGame.opponent||fmtDate(delGame.game_date)}?`}
        onConfirm={async()=>{await db.from("gd_games").delete().eq("id",delGame.id);setDelGame(null);load();}}
        onCancel={()=>setDelGame(null)}/>}
    </div>
  );
}

// ── Home ───────────────────────────────────────────────────────────────
// ── Multi-Team Command Center ──────────────────────────────────────────
function MultiCenter({entries,userId,brands,onBack}){
  const[activeIdx,setActiveIdx]=useState(0);
  const active=entries[activeIdx];
  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#000"}}>
      <div style={{display:"flex",borderBottom:`1px solid ${BORDER}`,background:"#000",flexShrink:0,overflowX:"auto",scrollbarWidth:"none"}}>
        <button onClick={onBack} style={{background:"none",border:"none",borderRight:`1px solid ${BORDER}`,color:MUTED,cursor:"pointer",padding:"0 14px",fontSize:20,lineHeight:1,flexShrink:0,display:"flex",alignItems:"center"}}>‹</button>
        {entries.map((e,i)=>{
          const isActive=i===activeIdx;
          const du=daysUntil(e.game.game_date);
          return(
            <button key={e.team.id} onClick={()=>setActiveIdx(i)}
              style={{display:"flex",alignItems:"center",gap:7,padding:"10px 16px",border:"none",borderBottom:isActive?`3px solid ${e.team.color}`:"3px solid transparent",background:isActive?e.team.color+"0d":"none",color:isActive?e.team.color:MUTED,fontFamily:"inherit",cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,transition:"all .15s"}}>
              <span style={{fontSize:18,lineHeight:1}}>{e.team.emoji}</span>
              <div style={{textAlign:"left"}}>
                <div style={{fontSize:11,fontWeight:isActive?800:500,letterSpacing:-.2}}>{e.team.short}</div>
                <div style={{fontSize:9,color:du===0?"#30D158":du===1?"#FF9F0A":MUTED,fontWeight:700}}>
                  {du===0?"TODAY":du===1?"TOMORROW":fmtDate(e.game.game_date,{month:"short",day:"numeric"})}
                </div>
              </div>
              {du===0&&<div style={{width:6,height:6,borderRadius:"50%",background:"#30D158",boxShadow:"0 0 6px #30D158",flexShrink:0}}/>}
            </button>
          );
        })}
      </div>
      <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column"}}>
        <CommandCenter key={active.team.id+"-"+active.game.id} team={active.team} game={active.game} userId={userId} brands={brands} onBack={onBack}/>
      </div>
    </div>
  );
}

// ── Home Screen ────────────────────────────────────────────────────────
function HomeScreen({userId,brands,onSelectTeam,onSelectMulti,onSignOut}){
  const[nextGames,setNextGames]=useState({});
  const[loading,setLoading]=useState(true);
  const[selected,setSelected]=useState(new Set());
  const[multiMode,setMultiMode]=useState(false);

  const load=async()=>{
    setLoading(true);
    const{data}=await db.from("gd_games").select("*").eq("user_id",userId).gte("game_date",todayStr()).order("game_date").order("game_time");
    const m={};(data||[]).forEach(g=>{if(!m[g.team_id])m[g.team_id]=g;});
    setNextGames(m);setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const todayTeams=TEAMS.filter(t=>{const g=nextGames[t.id];return g&&daysUntil(g.game_date)===0;});
  const teamsWithGames=TEAMS.filter(t=>nextGames[t.id]);

  const toggleSelect=id=>setSelected(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});

  const goMulti=()=>{
    const entries=[...selected].map(id=>({team:TMAP[id],game:nextGames[id]})).filter(e=>e.game);
    if(entries.length===1)onSelectTeam(entries[0].team);
    else if(entries.length>1)onSelectMulti(entries);
  };

  return(
    <div style={{height:"100%",display:"flex",flexDirection:"column",background:"#000"}}>
      <div style={{padding:"14px 16px 12px",borderBottom:`1px solid ${BORDER}`,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:900,fontSize:22,letterSpacing:-1.5}}>GAMEDAY</div>
          <div style={{fontSize:9,color:"#FF6B00",letterSpacing:3,fontWeight:700,textTransform:"uppercase",marginTop:2}}>Command Center</div>
        </div>
        {teamsWithGames.length>1&&(
          <button onClick={()=>{setMultiMode(m=>!m);setSelected(new Set());}}
            style={{background:multiMode?"#FF6B00":"none",border:`1px solid ${multiMode?"#FF6B00":BORDER}`,borderRadius:7,padding:"5px 11px",cursor:"pointer",color:multiMode?"#000":MUTED,fontSize:11,fontWeight:multiMode?800:400,transition:"all .15s"}}>
            {multiMode?"✕ Cancel":"⊕ Multi"}
          </button>
        )}
        <button onClick={onSignOut} style={{background:"none",border:`1px solid ${BORDER}`,borderRadius:7,padding:"5px 10px",cursor:"pointer",color:MUTED,fontSize:11}}>sign out</button>
      </div>

      {multiMode&&(
        <div style={{padding:"8px 16px",background:"#0d0800",borderBottom:`1px solid #FF6B0033`,display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <span style={{fontSize:11,color:"#FF6B00"}}>Select teams playing simultaneously</span>
          <div style={{flex:1}}/>
          {selected.size>0&&<button onClick={goMulti} style={{background:"#FF6B00",border:"none",borderRadius:8,padding:"6px 14px",cursor:"pointer",color:"#000",fontSize:12,fontWeight:900}}>GO LIVE ({selected.size})</button>}
        </div>
      )}

      <div style={{flex:1,overflowY:"auto",padding:"14px 16px 40px"}}>
        {loading&&<div style={{display:"flex",justifyContent:"center",padding:48}}><Spinner color="#FF6B00"/></div>}

        {!loading&&todayTeams.length>0&&(
          <div style={{background:"#0a1a0a",border:"1px solid #30D15833",borderRadius:12,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:"#30D158",boxShadow:"0 0 8px #30D158",flexShrink:0}}/>
            <span style={{fontSize:12,fontWeight:800,color:"#30D158"}}>GAME DAY:</span>
            <span style={{fontSize:12,color:"#30D158"}}>{todayTeams.map(t=>t.name).join(" · ")}</span>
            {todayTeams.length>1&&!multiMode&&(
              <button onClick={()=>{setMultiMode(true);setSelected(new Set(todayTeams.map(t=>t.id)));}}
                style={{marginLeft:"auto",background:"#30D158",border:"none",borderRadius:7,padding:"5px 11px",cursor:"pointer",color:"#000",fontSize:11,fontWeight:800}}>Run All</button>
            )}
          </div>
        )}

        {!loading&&(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:10,marginBottom:24}}>
            {TEAMS.map(team=>{
              const g=nextGames[team.id]||null;
              const du=g?daysUntil(g.game_date):null;
              const isToday=du===0;
              const accent=team.color;
              const isSel=selected.has(team.id);
              return(
                <div key={team.id}
                  onClick={()=>{if(multiMode){if(g)toggleSelect(team.id);}else onSelectTeam(team);}}
                  className="fade"
                  style={{background:isSel?accent+"0f":"#0a0a0a",borderRadius:13,border:`2px solid ${isSel?accent:isToday?accent+"55":BORDER}`,cursor:"pointer",overflow:"hidden",boxShadow:isSel?`0 0 20px ${accent}22`:isToday?`0 0 24px ${accent}15`:"none",transition:"all .2s",opacity:multiMode&&!g?.55:1}}
                  onMouseEnter={e=>{if(!isSel){e.currentTarget.style.borderColor=accent+"55";e.currentTarget.style.background="#0d0d0d";}}}
                  onMouseLeave={e=>{if(!isSel){e.currentTarget.style.borderColor=isToday?accent+"55":BORDER;e.currentTarget.style.background="#0a0a0a";}}}>
                  <div style={{background:accent+"0d",borderBottom:`1px solid ${accent}1a`,padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:28,lineHeight:1}}>{team.emoji}</span>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:800,fontSize:14,color:accent,letterSpacing:-.3}}>{team.name}</div>
                      <div style={{fontSize:10,color:MUTED,letterSpacing:.5,marginTop:1}}>{team.sport}</div>
                    </div>
                    {multiMode&&g&&(
                      <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${isSel?accent:BORDER}`,background:isSel?accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all .15s"}}>
                        {isSel&&<span style={{fontSize:12,color:"#fff",fontWeight:900,lineHeight:1}}>✓</span>}
                      </div>
                    )}
                    {!multiMode&&isToday&&<span style={{fontSize:9,fontWeight:800,color:"#30D158",background:"#30D15822",borderRadius:4,padding:"3px 8px",letterSpacing:.5}}>● LIVE</span>}
                  </div>
                  <div style={{padding:"10px 14px 12px"}}>
                    {g?(
                      <>
                        <div style={{fontSize:9,color:MUTED,letterSpacing:.5,textTransform:"uppercase",marginBottom:3}}>Next Game</div>
                        <div style={{fontSize:13,fontWeight:700,color:isToday?"#30D158":du===1?"#FF9F0A":TEXT}}>
                          {isToday?"Today!":du===1?"Tomorrow":fmtDate(g.game_date)}
                        </div>
                        <div style={{fontSize:11,color:MUTED,marginTop:2}}>
                          {g.opponent?"vs "+g.opponent:""}{g.game_time?" · "+fmtTime(g.game_time):""}{g.location?" · "+(g.location==="home"?"Home":g.location==="away"?"Away":"Neutral"):""}
                        </div>
                      </>
                    ):(
                      <div style={{fontSize:11,color:"#2a2a2a",fontStyle:"italic"}}>No upcoming games — tap to add</div>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {!loading&&brands.length>0&&(
          <div>
            <div style={{fontSize:9,color:MUTED,letterSpacing:1.2,fontWeight:700,textTransform:"uppercase",marginBottom:8}}>Brands ({brands.length})</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
              {brands.map(b=><span key={b} style={{fontSize:11,padding:"5px 10px",borderRadius:99,border:`1px solid ${BORDER}`,background:"#0a0a0a",color:MUTED}}>{b}</span>)}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Root ───────────────────────────────────────────────────────────────
function App(){
  const[screen,setScreen]=useState("loading");
  const[user,setUser]=useState(null);
  const[brands,setBrands]=useState([]);
  const[activeTeam,setActiveTeam]=useState(null);
  const[activeGame,setActiveGame]=useState(null);
  const[multiEntries,setMultiEntries]=useState(null);

  const loadBrands=async uid=>{
    const{data:mem}=await db.from("board_members").select("board_id").eq("user_id",uid);
    const ids=(mem||[]).map(m=>m.board_id);
    if(!ids.length)return;
    const{data:s}=await db.from("board_settings").select("brands_json").in("board_id",ids);
    const bm={};
    (s||[]).forEach(r=>{try{JSON.parse(r.brands_json||"[]").forEach(b=>{if(b.label)bm[b.label]=true;});}catch{}});
    setBrands(Object.keys(bm).sort());
  };

  useEffect(()=>{
    db.auth.getSession().then(({data:{session}})=>{
      if(session){setUser(session.user);loadBrands(session.user.id).then(()=>setScreen("home"));}
      else setScreen("auth");
    });
    const{data:{subscription}}=db.auth.onAuthStateChange((_,s)=>{if(!s){setUser(null);setScreen("auth");}});
    return()=>subscription.unsubscribe();
  },[]);

  if(screen==="loading")return(
    <div style={{height:"100%",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontWeight:900,fontSize:28,letterSpacing:-2}}>GAMEDAY</div>
      <Spinner size={24} color="#FF6B00"/>
    </div>
  );

  if(screen==="auth")return<AuthScreen onAuth={u=>{setUser(u);loadBrands(u.id).then(()=>setScreen("home"));}}/>;
  if(screen==="home")return<HomeScreen userId={user.id} brands={brands}
    onSelectTeam={t=>{setActiveTeam(t);setScreen("team");}}
    onSelectMulti={entries=>{setMultiEntries(entries);setScreen("multi");}}
    onSignOut={()=>db.auth.signOut()}/>;
  if(screen==="team"&&activeTeam)return<TeamScreen team={activeTeam} userId={user.id} brands={brands} onGo={g=>{setActiveGame(g);setScreen("center");}} onBack={()=>{setActiveTeam(null);setScreen("home");}}/>;
  if(screen==="center"&&activeTeam&&activeGame)return<CommandCenter team={activeTeam} game={activeGame} userId={user.id} brands={brands} onBack={()=>{setActiveGame(null);setScreen("team");}}/>;
  if(screen==="multi"&&multiEntries)return<MultiCenter entries={multiEntries} userId={user.id} brands={brands} onBack={()=>{setMultiEntries(null);setScreen("home");}}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
